name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: mops test (Motoko unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install mops
        run: npm install --global ic-mops

      - name: Install Mops dependencies
        run: mops install

      - name: Run unit tests
        run: mops test

  reproducible-build:
    name: reproducible build (redemption wasm hash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install mops
        run: npm install --global ic-mops

      - name: Install Mops dependencies
        run: mops install

      # Rebuild the redemption wasm with the pinned toolchain and assert it
      # reproduces the SHA-256 committed in redemption.wasm.sha256. A mismatch
      # means the source changed without the hash being refreshed
      # (run `bash scripts/verify-wasm.sh --write`) or the toolchain drifted.
      - name: Verify redemption wasm hash
        run: bash scripts/verify-wasm.sh --out redemption.wasm

      - name: Upload redemption wasm + hash
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: redemption-wasm
          path: |
            redemption.wasm
            redemption.wasm.sha256
          if-no-files-found: error

  reproducible-build-docker:
    name: reproducible build via Dockerfile.build (mainnet deploy path)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Exercises the EXACT artifact path scripts/deploy.sh -e ic uses, so a
      # broken Dockerfile fails here instead of mid-deploy. The native
      # `reproducible-build` job already confirms the hash value on Linux; this
      # job validates the Dockerfile recipe (mops toolchain init, pinned
      # ic-mops, base image, --platform pin, wasm extraction).
      - name: Build via Dockerfile.build
        run: docker build --platform=linux/amd64 -f Dockerfile.build -t icvc-redemption-build .

      - name: Extract wasm (as deploy.sh does) and assert canonical hash
        run: |
          docker run --rm --platform=linux/amd64 -v "$PWD:/out" \
            icvc-redemption-build cp /work/redemption.wasm /out/redemption.wasm
          echo "$(awk '{print $1}' redemption.wasm.sha256)  redemption.wasm" | sha256sum -c -

  frontend-build:
    name: frontend build (npm ci + esbuild bundle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Build @dfinity bundle
        working-directory: src/frontend
        run: npm run build

      - name: Verify bundle is non-empty
        run: |
          if [ ! -s src/frontend/js/dfinity.js ]; then
            echo "dfinity.js missing or empty after build" >&2
            exit 1
          fi
          ls -lh src/frontend/js/dfinity.js

  integration:
    name: integration suite (bash + local replica)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install icp-cli
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/dfinity/icp-cli/releases/download/v0.2.7/icp-cli-installer.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify icp-cli
        run: icp --version

      - name: Install mops
        run: npm install --global ic-mops

      - name: Install Mops dependencies
        run: mops install

      - name: Create dev identity
        run: |
          icp identity new icvc-dev --storage plaintext --quiet
          icp identity default icvc-dev

      - name: Start local network
        run: icp network start -d

      - name: Seed cycles into dev identity
        run: |
          echo y | icp token transfer 100 "$(icp identity principal)" \
            -e local --identity anonymous
          echo y | icp cycles mint --cycles 50t -e local

      - name: Local deploy
        run: bash scripts/deploy.sh -e local

      - name: Run integration suite
        run: bash tests/integration.sh

  pocketic:
    name: PocketIC suite (deterministic-time + failure paths)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install icp-cli
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/dfinity/icp-cli/releases/download/v0.2.7/icp-cli-installer.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install mops
        run: npm install --global ic-mops

      - name: Install Mops dependencies
        run: mops install

      - name: Install dfx 0.30.2 (provides the pocket-ic server binary)
        run: |
          DFXVM_INIT_YES=true sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
          # dfxvm lands on PATH via its env file, not ~/.local/bin.
          . "$HOME/.local/share/dfx/env"
          dfxvm install 0.30.2
          dfxvm default 0.30.2
          dfx --version
          dfx cache install   # populates the cache, incl. the pocket-ic binary
          # expose dfx to later steps
          echo "$(dirname "$(command -v dfx)")" >> "$GITHUB_PATH"

      - name: Build redemption wasm (PocketIC loads it)
        run: icp build

      - name: Install PocketIC Python deps
        working-directory: tests/pocketic
        run: pip install -r requirements.txt

      - name: Run PocketIC suite
        run: |
          export POCKET_IC_BIN="$(dfx cache show)/pocket-ic"
          if [ ! -x "$POCKET_IC_BIN" ]; then
            echo "pocket-ic server not found at $POCKET_IC_BIN; cache contents:" >&2
            ls -la "$(dfx cache show)" >&2 || true
            exit 1
          fi
          pytest tests/pocketic -q
