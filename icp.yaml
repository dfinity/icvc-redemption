# yaml-language-server: $schema=https://github.com/dfinity/icp-cli/raw/refs/tags/v1.0.0/docs/schemas/icp-yaml-schema.json
#
# Project configuration for icp-cli. This file replaces the legacy `dfx.json`.
# See `scripts/deploy.sh` for how this is driven end-to-end; see
# `tests/integration.sh` for the test harness.

canisters:
  # ICRC-1 + ICRC-2 play-token ledger for ICVC. Identical WASM and hash as
  # icp_ledger; the two are distinguished only by their canister id and the
  # init args we install with (different `token_symbol`, `minting_account`).
  - name: icvc_ledger
    build:
      steps:
        - type: pre-built
          path: ledger/ic-icrc1-ledger.wasm.gz
          sha256: a170bfdce5d66e751a3cc03747cb0f06b450af500e75e15976ec08a3f5691f4c

  - name: icp_ledger
    build:
      steps:
        - type: pre-built
          path: ledger/ic-icrc1-ledger.wasm.gz
          sha256: a170bfdce5d66e751a3cc03747cb0f06b450af500e75e15976ec08a3f5691f4c

  # Motoko backend. Built via mops + the pinned `moc 1.8.2` from mops.toml's
  # [toolchain] section, so the build matches the test runner.
  - name: redemption
    build:
      steps:
        - type: script
          commands:
            # --public-metadata makes the Candid interface readable by anyone
            # (default is `private` = controllers only), so the methods show on
            # the IC dashboard / can be introspected by any agent. Must stay in
            # sync with Dockerfile.build for the reproducible hash to match.
            - $(mops toolchain bin moc) --public-metadata candid:service --public-metadata candid:args src/redemption/main.mo $(mops sources) -o "$ICP_WASM_OUTPUT_PATH"

  # Asset (frontend) canister via the @dfinity/asset-canister recipe. icp-cli
  # 1.0.0 removed the `assets` sync step; the recipe bundles both the asset
  # canister wasm and the plugin that uploads `dir` (works on local + ic, incl.
  # re-syncing an already-deployed canister, so no dfx fallback is needed).
  #
  # The build bundles @dfinity/* with esbuild and assembles a CLEAN dist/ (no
  # node_modules / package files / template). It copies in js/config.js, which
  # scripts/deploy.sh writes from the .icp id mappings *before* `icp deploy`
  # (canister ids are not injected at build time in 1.0.0 — they are a runtime
  # ic_env cookie — so config is generated by the deploy script, as before).
  - name: frontend
    recipe:
      type: "@dfinity/asset-canister@v2.2.1"
      configuration:
        dir: src/frontend/dist
        build:
          - "cd src/frontend && npm ci"
          - "cd src/frontend && npm run build"
          - "cd src/frontend && test -f js/config.js || { echo 'js/config.js missing — run scripts/deploy.sh (it generates config.js before deploy)'; exit 1; }"
          - "cd src/frontend && rm -rf dist && mkdir -p dist/js && cp index.html style.css dist/ && cp js/app.js js/idl.js js/dfinity.js js/config.js dist/js/"

  # Internet Identity for the local dev environment only — mainnet uses the
  # global identity.ic0.app and does not deploy this canister. icp-cli does
  # not support `specified_id`, so the local II's canister id is whatever the
  # network assigns it; `scripts/deploy.sh` reads it back and injects it into
  # the frontend's runtime config.
  - name: internet_identity
    build:
      steps:
        - type: pre-built
          path: ledger/internet_identity.wasm.gz
          sha256: e039c7ab988593b23fa7113fa23cd29e959805e3d49a82fadaf408e528bfc6e2

networks:
  - name: local
    mode: managed
    gateway:
      bind: 127.0.0.1

environments:
  - name: local
    network: local
    canisters:
      - internet_identity
      - icvc_ledger
      - icp_ledger
      - redemption
      - frontend

  # IC mainnet — no `internet_identity` (uses the global one at identity.ic0.app).
  - name: ic
    network: ic
    canisters:
      - icvc_ledger
      - icp_ledger
      - redemption
      - frontend

  # Real-value mainnet. Same `ic` network, but a SEPARATE environment so its
  # canister ids live in .icp/data/mappings/prod.ids.json and never collide with
  # the play `ic` deployment above. Only OUR canisters are listed: the ICVC +
  # ICP ledgers are the real, externally-owned tokens (ids in canister_ids.json
  # under the `prod` key, seeded into the mapping by scripts/deploy.sh) and are
  # never built or deployed here.
  - name: prod
    network: ic
    canisters:
      - redemption
      - frontend
